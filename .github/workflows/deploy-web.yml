# Vercel GitHub integration을 활성화하면(Project Settings → Git) 이 workflow는 불필요.
# integration 없이 자체 배포하려면 아래 workflow 활성 — `if: false` 제거.
name: Deploy Web (Vercel CLI — optional)

on:
  push:
    branches: [master, main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: vercel deploy
    runs-on: ubuntu-latest
    if: false # Vercel git integration 사용 시 활성화하지 말 것. CLI 배포 원하면 false 제거.
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm i -g vercel@latest
      - name: pull env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
