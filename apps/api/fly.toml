# Fly.io 앱 설정 — Quotient API 서버
# 사용자 셋업: `flyctl launch --no-deploy --copy-config` 또는
#              `flyctl apps create quotient-api` 후 본 파일 그대로 사용.
# 시크릿 등록(사용자가 직접):
#   flyctl secrets set DATABASE_URL=...
#   flyctl secrets set SUPABASE_JWT_SECRET=...
#   flyctl secrets set ANTHROPIC_API_KEY=...
#   flyctl secrets set FRED_API_KEY=... ECOS_API_KEY=...
#   flyctl secrets set SENTRY_DSN_API=...
# 첫 배포(레포 루트에서 실행):
#   flyctl deploy --config apps/api/fly.toml --dockerfile apps/api/Dockerfile

app = "quotient-api"  # 사용자가 자신의 앱 이름으로 변경
primary_region = "nrt" # 도쿄 — Supabase ap-northeast-2(서울)와 가까움

# [build] 섹션 없음: 빌드 컨텍스트가 레포 루트여야 하므로(Dockerfile이 apps/api/와
# supabase/migrations를 COPY) Dockerfile 경로는 명령행 --dockerfile로만 지정한다.
# fly.toml에 dockerfile 키를 두면 apps/api/에서 deploy 시 잘못된 컨텍스트로 빌드되는 함정.

[deploy]
  release_command = "/app/migrate"

[env]
  API_PORT = "8080"
  API_ENV = "production"
  CORS_ORIGIN = "https://quotient.vercel.app" # 사용자 도메인으로 변경

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1   # cron 워커 항시 가동을 위해 최소 1대
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 200

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
